<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>TinyInvite</title>
  <style>
    :root {
      --bg-1: #fff1f5;
      --bg-2: #ffe3c2;
      --bg-3: #dff7ef;
      --card: rgba(255, 255, 255, 0.86);
      --text: #35251f;
      --muted: #7b6258;
      --primary: #ff7d97;
      --primary-dark: #e85d7c;
      --coffee: #8b5e3c;
      --shadow: 0 18px 48px rgba(121, 75, 64, 0.18);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard",
        "Noto Sans KR", "Segoe UI", sans-serif;
      color: var(--text);
    }

    body {
      min-height: 100vh;
      min-height: 100svh;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: max(16px, env(safe-area-inset-top)) 16px max(16px, env(safe-area-inset-bottom));
      overflow: hidden;
      background:
        radial-gradient(circle at 18% 18%, rgba(255, 255, 255, 0.9) 0 7%, transparent 8%),
        radial-gradient(circle at 86% 12%, rgba(255, 214, 226, 0.85) 0 9%, transparent 10%),
        radial-gradient(circle at 78% 84%, rgba(213, 248, 231, 0.95) 0 12%, transparent 13%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2) 52%, var(--bg-3));
    }

    .page {
      width: min(100%, 430px);
      position: relative;
    }

    .card {
      position: relative;
      min-height: min(660px, calc(100dvh - 32px));
      max-height: calc(100dvh - 32px);
      overflow: hidden;
      padding: 28px 22px 22px;
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: 28px;
      background: var(--card);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    .card::before,
    .card::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      pointer-events: none;
    }

    .card::before {
      width: 118px;
      height: 118px;
      top: -50px;
      right: -42px;
      background: rgba(255, 125, 151, 0.16);
    }

    .card::after {
      width: 86px;
      height: 86px;
      left: -32px;
      bottom: -24px;
      background: rgba(139, 94, 60, 0.12);
    }

    .screen {
      position: absolute;
      inset: 0;
      z-index: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 22px;
      padding: 28px 22px 22px;
      opacity: 0;
      transform: translateY(12px) scale(0.98);
      pointer-events: none;
      transition: opacity 220ms ease, transform 220ms ease;
    }

    .screen.active {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }

    .badge {
      align-self: center;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 68px;
      min-height: 68px;
      border-radius: 24px;
      background: #fff7ed;
      box-shadow: inset 0 -5px 0 rgba(139, 94, 60, 0.08);
      font-size: 34px;
    }

    .meme-img {
      width: min(70%, 190px);
      aspect-ratio: 1 / 1;
      align-self: center;
      object-fit: cover;
      border: 3px solid rgba(255, 255, 255, 0.92);
      border-radius: 24px;
      background: #fff;
      box-shadow: 0 14px 28px rgba(121, 75, 64, 0.16);
    }

    .intro-meme {
      width: min(72%, 194px);
      margin-bottom: -4px;
    }

    .result-meme {
      width: min(64%, 178px);
      margin-bottom: -4px;
    }
    h1,
    h2,
    p {
      margin: 0;
      text-align: center;
    }

    h1,
    h2 {
      font-size: clamp(30px, 9vw, 42px);
      line-height: 1.18;
      letter-spacing: 0;
      word-break: keep-all;
    }

    p {
      color: var(--muted);
      font-size: 17px;
      line-height: 1.55;
      word-break: keep-all;
    }

    .miss-note {
      min-height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      align-self: center;
      padding: 6px 13px;
      border-radius: 999px;
      background: rgba(255, 125, 151, 0.13);
      color: var(--primary-dark);
      font-size: 20px;
      font-weight: 900;
      opacity: 0;
      visibility: hidden;
      transform: translateY(5px);
      transition: opacity 180ms ease, transform 180ms ease, visibility 180ms ease;
    }

    .miss-note.show {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .button-area {
      position: relative;
      width: 100%;
      height: 154px;
      margin-top: 0;
    }

    button,
    .link-button {
      border: 0;
      border-radius: 18px;
      min-height: 56px;
      padding: 15px 18px;
      font: inherit;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      touch-action: manipulation;
      user-select: none;
      transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
    }

    button:active,
    .link-button:active {
      transform: translateY(2px) scale(0.98);
    }

    .primary {
      background: linear-gradient(180deg, #ff8aa4, var(--primary));
      color: #fff;
      box-shadow: 0 10px 0 var(--primary-dark), 0 18px 26px rgba(232, 93, 124, 0.24);
    }

    .secondary {
      background: #fff;
      color: var(--coffee);
      box-shadow: 0 10px 0 rgba(139, 94, 60, 0.16), 0 14px 20px rgba(139, 94, 60, 0.1);
    }

    .ghost {
      background: #fffaf7;
      color: #8c5d54;
      box-shadow: 0 9px 0 rgba(140, 93, 84, 0.13), 0 14px 20px rgba(140, 93, 84, 0.1);
    }

    #yesBtn {
      position: absolute;
      left: 0;
      bottom: 0;
      width: calc(50% - 7px);
    }

    .deny-tap-target {
      position: absolute;
      right: 0;
      bottom: 0;
      width: calc(50% - 7px);
      min-height: 72px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      z-index: 2;
      transition: left 180ms cubic-bezier(0.22, 0.9, 0.34, 1.18),
        top 180ms cubic-bezier(0.22, 0.9, 0.34, 1.18);
    }

    .deny-tap-target.is-running {
      right: auto;
      bottom: auto;
    }

    #noBtn {
      --deny-scale: 1;
      width: 100%;
      transform: scale(var(--deny-scale));
      transform-origin: center bottom;
      transition: transform 180ms ease, background 160ms ease, box-shadow 160ms ease;
    }

    .course-list {
      display: grid;
      gap: 14px;
      width: 100%;
    }

    .course-btn {
      width: 100%;
      text-align: left;
      background: #fff;
      color: var(--text);
      box-shadow: 0 8px 0 rgba(255, 125, 151, 0.16), 0 14px 20px rgba(121, 75, 64, 0.1);
    }

    .course-btn span {
      display: inline-flex;
      width: 32px;
      height: 32px;
      margin-right: 8px;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      background: #fff1f5;
    }


    .course-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 66px;
      padding: 10px 12px;
    }

    .course-thumb {
      width: 48px;
      height: 48px;
      flex: 0 0 auto;
      object-fit: cover;
      border: 1px solid rgba(255, 125, 151, 0.18);
      border-radius: 14px;
      background: #fff7ed;
    }

    .course-btn span {
      flex: 0 0 auto;
      margin-right: 0;
    }

    .course-btn strong {
      min-width: 0;
      font: inherit;
      line-height: 1.25;
    }    .result-box {
      width: 100%;
      padding: 16px;
      border-radius: 22px;
      background: #fffaf7;
      border: 2px dashed rgba(255, 125, 151, 0.42);
      text-align: center;
      font-size: 20px;
      font-weight: 900;
      color: var(--primary-dark);
      word-break: keep-all;
    }

    .link-button {
      display: inline-flex;
      width: 100%;
      align-items: center;
      justify-content: center;
      text-decoration: none;
    }

    .tiny {
      position: absolute;
      color: rgba(53, 37, 31, 0.22);
      font-size: 22px;
      pointer-events: none;
      animation: float 3.4s ease-in-out infinite;
    }

    .tiny.two {
      right: 24px;
      bottom: 24px;
      animation-delay: -1.2s;
    }

    @keyframes float {
      0%,
      100% {
        transform: translateY(0) rotate(-8deg);
      }
      50% {
        transform: translateY(-8px) rotate(8deg);
      }
    }

    @media (max-height: 640px) {
      .card {
        min-height: calc(100dvh - 24px);
        border-radius: 24px;
      }

      .screen {
        gap: 14px;
        padding: 22px 18px 18px;
      }

      .badge {
        min-width: 56px;
        min-height: 56px;
        border-radius: 20px;
        font-size: 28px;
      }

      h1,
      h2 {
        font-size: 29px;
      }

      .button-area {
        height: 132px;
      }

      button,
      .link-button {
        min-height: 52px;
        padding: 13px 14px;
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <main class="page" aria-live="polite">
    <section class="card" id="card">
      <span class="tiny two">☕</span>

      <div class="screen active" id="introScreen">
        <img class="meme-img intro-meme" id="introMeme" alt="귀여운 갓생 밈">
        <h1>새로운 약속 요청이<br>도착했습니다</h1>
        <div class="miss-note" id="missNote" aria-live="polite" aria-hidden="true"></div>

        <div class="button-area" id="buttonArea">
          <button class="primary" id="yesBtn" type="button">수락하기</button>
          <div class="deny-tap-target" id="denyTapTarget">
            <button class="ghost" id="noBtn" type="button">거절하기</button>
          </div>
        </div>
      </div>

      <div class="screen" id="courseScreen">
        <div class="badge" aria-hidden="true">✨</div>
        <h2>뭐 할래?</h2>
        <div class="course-list">
          <button class="course-btn" type="button" data-course="토이스토리 볼래" data-image-key="movie">
            <img class="course-thumb" alt="" aria-hidden="true">
            <span aria-hidden="true">🎬</span><strong>토이스토리 볼래</strong>
          </button>
          <button class="course-btn" type="button" data-course="카공할래" data-image-key="study">
            <img class="course-thumb" alt="" aria-hidden="true">
            <span aria-hidden="true">📚</span><strong>카공할래</strong>
          </button>
          <button class="course-btn" type="button" data-course="술한잔하기" data-image-key="drink">
            <img class="course-thumb" alt="" aria-hidden="true">
            <span aria-hidden="true">🍻</span><strong>술한잔하기</strong>
          </button>
        </div>
      </div>

      <div class="screen" id="resultScreen">
        <div class="badge" aria-hidden="true">🎉</div>
        <img class="meme-img result-meme" id="resultMeme" alt="선택한 코스 밈 이미지">
        <div class="result-box" id="selectedCourse">선택한 코스</div>
        <p>좋은 선택입니다<br>이제 일정만 작성하면 됩니다.</p>
        <button class="primary link-button" id="formBtn" type="button">일정 작성하러 가기</button>
      </div>
    </section>
  </main>

    };
    const introScreen = document.querySelector("#introScreen");
    const courseScreen = document.querySelector("#courseScreen");
    const resultScreen = document.querySelector("#resultScreen");
    const yesBtn = document.querySelector("#yesBtn");
    const noBtn = document.querySelector("#noBtn");
    const buttonArea = document.querySelector("#buttonArea");
    const denyTapTarget = document.querySelector("#denyTapTarget");
    const missNote = document.querySelector("#missNote");
    const selectedCourse = document.querySelector("#selectedCourse");
    const formBtn = document.querySelector("#formBtn");
    const courseButtons = document.querySelectorAll(".course-btn");
    const introMeme = document.querySelector("#introMeme");
    const resultMeme = document.querySelector("#resultMeme");
    let selectedFormUrl = FORM_URLS.drink;


    introMeme.src = MEME_IMAGES.intro;
    document.querySelectorAll(".course-btn").forEach((button) => {
      const thumb = button.querySelector(".course-thumb");
      thumb.src = MEME_IMAGES[button.dataset.imageKey];
    });
    function showScreen(nextScreen) {
      [introScreen, courseScreen, resultScreen].forEach((screen) => {
        screen.classList.toggle("active", screen === nextScreen);
      });
    }

    function acceptInvite() {
      showScreen(courseScreen);
    }

    const denyScales = [0.85, 0.7, 0.5];
    let denyStep = 0;

    function boxesOverlap(a, b, gap) {
      return !(
        a.right + gap < b.left ||
        a.left - gap > b.right ||
        a.bottom + gap < b.top ||
        a.top - gap > b.bottom
      );
    }

    function moveDenyButton() {
      denyTapTarget.classList.add("is-running");

      const maxX = Math.max(0, buttonArea.clientWidth - denyTapTarget.offsetWidth);
      const maxY = Math.max(0, buttonArea.clientHeight - denyTapTarget.offsetHeight);
      const gap = 10;
      const yesBox = {
        left: yesBtn.offsetLeft,
        top: yesBtn.offsetTop,
        right: yesBtn.offsetLeft + yesBtn.offsetWidth,
        bottom: yesBtn.offsetTop + yesBtn.offsetHeight
      };
      const randomBetween = (min, max) => Math.round(min + Math.random() * (max - min));
      const safeZones = [];
      const rightMin = Math.ceil(yesBox.right + gap);
      const topMax = Math.floor(yesBox.top - denyTapTarget.offsetHeight - gap);

      if (rightMin <= maxX) {
        safeZones.push(() => ({
          x: randomBetween(rightMin, maxX),
          y: randomBetween(0, maxY)
        }));
      }

      if (topMax >= 0) {
        safeZones.push(() => ({
          x: randomBetween(0, maxX),
          y: randomBetween(0, Math.min(topMax, maxY))
        }));
      }

      // 버튼 영역 밖으로 나가지 않으면서 수락 버튼과 겹치지 않는 구역만 사용합니다.
      const pick = safeZones.length > 0
        ? safeZones[Math.floor(Math.random() * safeZones.length)]()
        : { x: maxX, y: 0 };
      const fallbackBox = {
        left: pick.x,
        top: pick.y,
        right: pick.x + denyTapTarget.offsetWidth,
        bottom: pick.y + denyTapTarget.offsetHeight
      };

      if (boxesOverlap(fallbackBox, yesBox, gap)) {
        pick.x = maxX;
        pick.y = 0;
      }

      denyTapTarget.style.left = `${pick.x}px`;
      denyTapTarget.style.top = `${pick.y}px`;
    }

    function handleDenyTap(event) {
      event.preventDefault();

      if (noBtn.dataset.acceptReady === "true") {
        acceptInvite();
        return;
      }

      const nextScale = denyScales[Math.min(denyStep, denyScales.length - 1)];
      noBtn.style.setProperty("--deny-scale", nextScale);
      denyStep += 1;

      if (nextScale === 0.5) {
        missNote.textContent = "같이 카공 하고싶어.";
        missNote.setAttribute("aria-hidden", "false");
        missNote.classList.add("show");
        noBtn.textContent = "나도 ";
        noBtn.dataset.acceptReady = "true";
        noBtn.setAttribute("aria-label", "나도");
      } else {
        noBtn.textContent = "거절하기 😝";
        noBtn.setAttribute("aria-label", "거절하기 메롱");
      }

      moveDenyButton();
    }

    yesBtn.addEventListener("click", acceptInvite);
    denyTapTarget.addEventListener("click", handleDenyTap);

    courseButtons.forEach((button) => {
      button.addEventListener("click", () => {
        selectedCourse.textContent = button.dataset.course;
        selectedFormUrl = FORM_URLS[button.dataset.imageKey] || FORM_URLS.drink;
        resultMeme.src = MEME_IMAGES[button.dataset.imageKey];
        resultMeme.alt = `${button.dataset.course} 밈 이미지`;
        showScreen(resultScreen);
      });
    });

    formBtn.addEventListener("click", () => {
      window.location.href = selectedFormUrl;
    });
  </script>
